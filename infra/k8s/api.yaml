# API tier: stateless FastAPI replicas behind the cluster ingress.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-api
  namespace: risk-analytics
spec:
  replicas: 2
  selector: { matchLabels: { app: risk-api } }
  template:
    metadata: { labels: { app: risk-api } }
    spec:
      containers:
        - name: api
          image: registry.internal/abs-risk-analytics/api:latest
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
          ports: [{ containerPort: 8001 }]
          envFrom: [{ secretRef: { name: risk-env } }]   # DATABASE_URL, REDIS_URL, KAFKA_BOOTSTRAP
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /api/health, port: 8001 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: risk-api
  namespace: risk-analytics
spec:
  selector: { app: risk-api }
  ports: [{ port: 80, targetPort: 8001 }]
