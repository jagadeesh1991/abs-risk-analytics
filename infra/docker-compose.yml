# Dev/staging stack for the Structured Products Risk Engine.
# Blueprint — deploy when moving beyond single-machine mode.
#   docker compose -f infra/docker-compose.yml up -d
services:
  api:
    build: { context: .., dockerfile: infra/Dockerfile.api }
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    ports: ["8001:8001"]
    environment:
      DATABASE_URL: postgresql://risk:risk@timescaledb:5432/risk
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP: kafka:9092
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on: [timescaledb, redis, kafka]

  worker:
    build: { context: .., dockerfile: infra/Dockerfile.api }
    command: celery -A app.tasks worker --loglevel=info --concurrency=8
    environment:
      DATABASE_URL: postgresql://risk:risk@timescaledb:5432/risk
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      KAFKA_BOOTSTRAP: kafka:9092
    deploy:
      replicas: 2
    depends_on: [redis, kafka]

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: risk
      POSTGRES_PASSWORD: risk
      POSTGRES_DB: risk
    ports: ["5432:5432"]
    volumes:
      - tsdb-data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  kafka:
    image: apache/kafka:3.8.0            # KRaft mode, no ZooKeeper
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  tsdb-data:
